name: Build & Push Windows Container

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'

env:
  IMAGE_NAME: aaronkinchen/ryanair-payments
  CONTEXT:    .

jobs:
  build-and-push:
    # Windows runner required — .NET Framework 4.8 Windows containers only
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tags
        id: tags
        shell: pwsh
        run: |
          $tag  = "${{ github.event.inputs.tag }}" -ne "" ? "${{ github.event.inputs.tag }}" : "latest"
          $sha  = "${{ github.sha }}".Substring(0, 7)
          $full = "${{ env.IMAGE_NAME }}:$tag"
          $sha_tag = "${{ env.IMAGE_NAME }}:$sha"
          Write-Output "tag=$tag"       >> $env:GITHUB_OUTPUT
          Write-Output "sha=$sha"       >> $env:GITHUB_OUTPUT
          Write-Output "full=$full"     >> $env:GITHUB_OUTPUT
          Write-Output "sha_tag=$sha_tag" >> $env:GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        working-directory: ${{ env.CONTEXT }}
        run: |
          docker build `
            -t "${{ steps.tags.outputs.full }}" `
            -t "${{ steps.tags.outputs.sha_tag }}" `
            --label "build.sha=${{ github.sha }}" `
            --label "build.run=${{ github.run_number }}" `
            .

      - name: Push to Docker Hub
        run: |
          docker push "${{ steps.tags.outputs.full }}"
          docker push "${{ steps.tags.outputs.sha_tag }}"

      - name: Print image digest
        run: |
          docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.tags.outputs.full }}"
